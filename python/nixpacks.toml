[phases.setup]
nixPkgs = ['python311', 'python311Packages.pip', 'ffmpeg']

[phases.install]
cmds = [
  'python3 -m venv /opt/venv',
  '. /opt/venv/bin/activate && pip install -r requirements.txt',
  '. /opt/venv/bin/activate && playwright install --with-deps chromium'
]

[phases.build]
cmds = []

[start]
cmd = '. /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port $PORT'
